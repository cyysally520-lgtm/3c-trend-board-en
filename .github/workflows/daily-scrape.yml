name: Daily Scrape & Deploy

on:
  # 已停用每日自动调度（2026-06-18 用户决定改为手动触发）。
  # 如需恢复自动跑，取消下面 schedule 两行注释即可。
  # schedule:
  #   - cron: '0 0 * * *'   # 每天 UTC 00:00 / 北京时间 08:00
  # 手动触发：Actions 页面点 "Run workflow"，或 gh workflow run daily-scrape.yml
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 全量抓 8 源 + Gemini 翻译 + 多个动态站 Playwright，30 分钟不够
    timeout-minutes: 120

    steps:
      - name: Debug info
        run: |
          echo "Current UTC time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Current Beijing time: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S CST')"
          echo "Node version: $(node --version)"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Setup virtual display (Xvfb) for headed browser
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1440x900x24 &
          sleep 2

      - name: Run scraper
        run: npm run scrape
        env:
          # AI 翻译 keys（在 GitHub → Settings → Secrets 里配置）
          # Gemini 优先（免费），全部限流 → fallback 到 Deepseek
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 使用 headed 模式绕过 Cloudflare（通过 Xvfb 虚拟显示）
          PLAYWRIGHT_HEADED: '1'
          DISPLAY: ':99'

      - name: Check if data changed
        id: git-check
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push updated data
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/
          git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
          # 跑爬虫期间 main 可能有新 commit，先 rebase 再 push
          # 重试 3 次以防 push 同时被其他动作领先
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying in 5s..."
            sleep 5
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Railway 监听 main 分支，commit push 后会自动重新部署，无需额外 webhook