name: Daily Scrape & Deploy

on:
  # 每天 UTC 00:00（北京时间 08:00）自动运行
  schedule:
    - cron: '0 0 * * *'
  # 也可以手动触发
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: npm run scrape
        env:
          # 如果你需要 Gemini 翻译，在 GitHub → Settings → Secrets 里配置
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Check if data changed
        id: git-check
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push updated data
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/
          git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Vercel Redeploy
        if: steps.git-check.outputs.changed == 'true'
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "Vercel deploy hook triggered"
          else
            echo "No VERCEL_DEPLOY_HOOK configured, skipping redeploy"
          fi