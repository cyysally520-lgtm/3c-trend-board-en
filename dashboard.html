const state = { tab:'crowd', platform:'all', sort:'hot', category:'all', newsCategory:'all', newsSources:['The Verge','TechCrunch','Gizchina','Ventureburn'], startupRound:'all', startupCategory:'all', socialCategory:'all' };
const fmt = n => n.toLocaleString('zh-CN');
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN',{hour12:false});

$$('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
  state.tab = btn.dataset.tab;
  $$('.tab-btn').forEach(b => { b.classList.remove('border-emerald-500','text-emerald-600'); b.classList.add('border-transparent','text-gray-500'); });
  btn.classList.add('border-emerald-500','text-emerald-600'); btn.classList.remove('border-transparent','text-gray-500');
  $$('.tab-panel').forEach(p => p.classList.add('hidden'));
  $(`#tab-${state.tab}`).classList.remove('hidden');
}));

function renderCrowd() {
  let list = [...CROWD_PRODUCTS];
  if (state.platform!=='all') list = list.filter(p => p.platform===state.platform);
  if (state.category!=='all') list = list.filter(p => p.tags.includes(state.category));
  const key = {hot:'hotScore',trend:'trendingScore',raised:'raised',new:'startedAt'}[state.sort];
  list.sort((a,b) => state.sort==='new' ? new Date(b.startedAt)-new Date(a.startedAt) : b[key]-a[key]);
  $('#crowdCount').textContent = list.length;
  $('#crowdGrid').innerHTML = list.map(p => {
    const pl = PLATFORM_LABEL[p.platform];
    return `<div class="bg-white rounded-xl border overflow-hidden card-hover">
      <div class="relative"><img src="${p.image}" alt="${p.name}" class="w-full h-44 object-cover" /><span class="platform-badge ${pl.cls} absolute top-2 left-2">${pl.name}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(p.progress,100)}%"></div></div>
      <div class="p-4">
        <h3 class="font-semibold text-sm leading-snug line-clamp-2" style="min-height:40px">${p.name}</h3>
        <p class="text-xs text-gray-500 mt-1">${p.creator}</p>
        <div class="mt-2 text-xs text-gray-700 flex items-center gap-1"><span>🕐</span><span>已筹集 <b class="text-gray-900">¥${fmt(p.raised)}</b></span><span class="text-gray-300">·</span><span>进度 <b class="text-emerald-600">${p.progress}%</b></span></div>
        <div class="mt-2 text-[11px] text-gray-500 flex gap-3"><span>👥 ${fmt(p.backers)} 支持者</span><span>💰 起步 ¥${p.price}</span></div>
        <div class="mt-3 flex flex-wrap gap-1">${p.tags.map(t => `<span class="tag tag-trend">#${t}</span>`).join('')}</div>
        <div class="mt-3 flex gap-2">
          <a href="${p.campaignUrl}" target="_blank" class="flex-1 text-center text-xs py-1.5 rounded bg-emerald-500 text-white hover:bg-emerald-600">众筹页</a>
          <a href="${p.officialUrl}" target="_blank" class="flex-1 text-center text-xs py-1.5 rounded border border-gray-300 hover:bg-gray-50">官网</a>
        </div>
      </div></div>`;
  }).join('');
}
$$('.platform-btn').forEach(btn => btn.addEventListener('click', () => {
  state.platform = btn.dataset.platform;
  $$('.platform-btn').forEach(b => { b.classList.remove('bg-emerald-500','text-white'); b.classList.add('text-gray-600'); });
  btn.classList.add('bg-emerald-500','text-white'); btn.classList.remove('text-gray-600');
  renderCrowd();
}));
$$('.sort-btn').forEach(btn => btn.addEventListener('click', () => {
  state.sort = btn.dataset.sort;
  $$('.sort-btn').forEach(b => { b.classList.remove('bg-orange-500','text-white'); b.classList.add('text-gray-600'); });
  btn.classList.add('bg-orange-500','text-white'); btn.classList.remove('text-gray-600');
  renderCrowd();
}));
$('#categoryFilter').addEventListener('change', e => { state.category = e.target.value; renderCrowd(); });

function renderNews() {
  let list = NEWS_LIST.filter(n => state.newsSources.includes(n.source));
  if (state.newsCategory!=='all') list = list.filter(n => n.category===state.newsCategory);
  $('#newsList').innerHTML = list.map(n => `<article class="verge-card p-5 flex gap-5 hover:bg-gray-50 transition">
    <img src="${n.image}" class="w-44 h-28 object-cover rounded-lg flex-shrink-0" />
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 text-xs mb-2"><span class="platform-badge ${n.sourceCls}">${n.source}</span><span class="text-gray-400">·</span><span class="text-gray-500">${n.timeAgo}</span><span class="text-gray-400">·</span><span class="tag tag-trend">#${n.category}</span></div>
      <h3 class="text-lg font-bold leading-snug mb-1 line-clamp-2">${n.title}</h3>
      <p class="text-sm text-gray-600 line-clamp-2">${n.summary}</p>
      <div class="mt-2 flex items-center justify-between"><div class="text-xs text-gray-500 flex gap-3"><span>👁 ${n.views}</span><span>💬 ${n.comments}</span></div><a href="${n.url}" target="_blank" class="text-xs text-emerald-600 hover:underline">阅读原文 →</a></div>
    </div></article>`).join('');
}
$$('.news-src').forEach(label => label.addEventListener('click', e => {
  e.preventDefault();
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
  if (cb.checked) { state.newsSources.push(cb.value); label.classList.remove('opacity-40'); }
  else { state.newsSources = state.newsSources.filter(s => s!==cb.value); label.classList.add('opacity-40'); }
  renderNews();
}));
$('#newsCategory').addEventListener('change', e => { state.newsCategory = e.target.value; renderNews(); });

function renderStartups() {
  let list = [...STARTUPS];
  if (state.startupRound!=='all') list = list.filter(s => s.round===state.startupRound);
  if (state.startupCategory!=='all') list = list.filter(s => s.category===state.startupCategory);
  $('#startupGrid').innerHTML = list.map(s => `<div class="bg-white rounded-xl border p-5 card-hover">
    <div class="flex items-start gap-3 mb-3">
      <div class="w-12 h-12 ${s.logoColor} text-white rounded-lg flex items-center justify-center text-xl font-bold flex-shrink-0">${s.logo}</div>
      <div class="flex-1 min-w-0"><div class="flex items-center gap-2 mb-1"><h3 class="font-bold text-base">${s.name}</h3><span class="platform-badge ${s.sourceCls}">${s.source}</span></div><div class="flex gap-1 flex-wrap"><span class="tag tag-trend">#${s.category}</span><span class="tag">${s.round}</span></div></div>
    </div>
    <p class="text-sm text-gray-600 mb-3 line-clamp-2">${s.desc}</p>
    <div class="space-y-1.5 text-xs text-gray-700">
      <div>📅 <span class="text-gray-500">成立：</span>${s.foundedYear}</div>
      <div>👤 <span class="text-gray-500">创始人：</span>${s.founders.join(' · ')}</div>
      <div>💰 <span class="text-gray-500">最新融资：</span><b class="text-orange-600">${s.amount}</b> · ${s.round}</div>
      <div>🏦 <span class="text-gray-500">投资方：</span>${s.investors.join('，')}</div>
      <div>📍 <span class="text-gray-500">总部：</span>${s.location}</div>
    </div>
    <div class="mt-4 flex gap-2"><a href="${s.sourceUrl}" target="_blank" class="flex-1 text-center text-xs py-1.5 rounded bg-gray-900 text-white hover:bg-black">来源原文 →</a><a href="${s.officialUrl}" target="_blank" class="flex-1 text-center text-xs py-1.5 rounded border border-gray-300 hover:bg-gray-50">访问官网</a></div>
  </div>`).join('');
}
$('#startupRound').addEventListener('change', e => { state.startupRound = e.target.value; renderStartups(); });
$('#startupCategory').addEventListener('change', e => { state.startupCategory = e.target.value; renderStartups(); });

function renderSocial() {
  let list = [...SOCIAL_BUZZ];
  if (state.socialCategory!=='all') list = list.filter(b => b.category===state.socialCategory);
  list.sort((a,b) => b.heat - a.heat);
  const maxHeat = Math.max(...list.map(b => b.heat));
  $('#socialList').innerHTML = list.map((b, idx) => `<div class="bg-white rounded-xl border p-5">
    <div class="flex items-start gap-4">
      <div class="flex-shrink-0 text-center"><div class="text-2xl font-bold text-gray-300">#${idx+1}</div><img src="${b.image}" class="w-20 h-20 object-cover rounded-lg mt-2" /></div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1"><h3 class="font-bold text-base">${b.name}</h3><span class="tag tag-trend">#${b.category}</span></div>
        <div class="flex items-center gap-2 mb-2"><span class="text-xs text-gray-500">🔥 总热度</span><span class="text-sm font-bold text-red-500">${fmt(b.heat)}</span></div>
        <div class="heat-bar mb-3"><div class="heat-fill" style="width:${(b.heat/maxHeat)*100}%"></div></div>
        <div class="text-xs text-gray-500 mb-1">主要讨论维度：</div>
        <div class="dim-bar mb-2">${b.dims.map(d => `<div style="width:${d.pct}%;background:${d.color}" title="${d.name} ${d.pct}%"></div>`).join('')}</div>
        <div class="flex flex-wrap gap-3 text-xs mb-4">${b.dims.map(d => `<span class="flex items-center gap-1"><span class="inline-block w-2 h-2 rounded" style="background:${d.color}"></span>${d.name} <b>${d.pct}%</b></span>`).join('')}</div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">${b.platforms.map(p => `<a href="${p.url}" target="_blank" class="flex items-center justify-between px-3 py-2 rounded-lg bg-gray-50 hover:bg-gray-100 transition"><div class="min-w-0 flex-1"><div class="text-xs font-semibold text-gray-700">${p.name} · ${p.count}</div><div class="text-[11px] text-gray-500 truncate">「${p.sample}」 ${p.metric}</div></div><span class="text-emerald-600 text-xs ml-2">→</span></a>`).join('')}</div>
      </div>
    </div>
  </div>`).join('');
}
$('#socialCategory').addEventListener('change', e => { state.socialCategory = e.target.value; renderSocial(); });

renderCrowd(); renderNews(); renderStartups(); renderSocial();
